name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - run: yarn install --immutable

      - name: Audit dependencies
        run: yarn npm audit --severity high --all

      - name: Type-check admin
        run: npx tsc --noEmit -p admin/tsconfig.json

      - name: Type-check server
        run: npx tsc --noEmit -p server/tsconfig.json

      - name: Build
        run: yarn build

      - name: Plugin verify
        run: yarn verify

      - name: Test
        run: yarn test
